<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetWise - Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="brand-box">
      <h1>BudgetWise</h1>
      <p>Gère ton budget simplement et intelligemment.</p>
    </div>

    <div class="tabs">
      <button id="btnShowLogin" class="tab-btn active">Connexion</button>
      <button id="btnShowRegister" class="tab-btn">Inscription</button>
    </div>

    <div id="messageBox" class="message-box"></div>

    <section id="loginSection" class="form-card">
      <h2>Connexion</h2>
      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="exemple@email.com" required />

        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Votre mot de passe" required />

        <button type="submit" class="primary-btn">Se connecter</button>
      </form>
    </section>

    <section id="registerSection" class="form-card hidden">
      <h2>Inscription</h2>
      <form id="registerForm">
        <label for="registerName">Nom</label>
        <input type="text" id="registerName" placeholder="Votre nom" required />

        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="exemple@email.com" required />

        <label for="registerPassword">Mot de passe</label>
        <input type="password" id="registerPassword" placeholder="Minimum 6 caractères" required />

        <label for="registerSalary">Salaire aux 2 semaines ($)</label>
        <input type="number" id="registerSalary" placeholder="2000" min="0" step="0.01" required />

        <button type="submit" class="primary-btn">Créer un compte</button>
      </form>
    </section>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
